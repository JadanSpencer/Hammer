<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Hammerhead Cafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0e0b08;
      --card:     #221c16;
      --amber:    #c8831a;
      --amber-lt: #e8a84b;
      --sage:     #7a9e7e;
      --text:     #f0e6d3;
      --muted:    #937e6a;
      --border:   rgba(200,131,26,.18);
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Outfit',sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100dvh; overflow-x:hidden;
    }
    body::after {
      content:''; position:fixed; inset:0; z-index:100;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events:none; opacity:.6;
    }
    .bg-glow {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 70% 55% at 50% 30%, rgba(200,131,26,.1) 0%, transparent 62%),
        radial-gradient(ellipse 50% 45% at 10% 90%, rgba(122,158,126,.1) 0%, transparent 55%);
    }

    canvas#confetti { position:fixed; inset:0; z-index:1; pointer-events:none; }

    /* Navbar */
    .navbar { position:sticky; top:0; z-index:50; display:flex; justify-content:center; }
    .navbar-inner {
      width:100%; max-width:1160px;
      display:flex; align-items:center; justify-content:center;
      padding:1rem 2rem;
      background:rgba(14,11,8,.8); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo { font-family:'Fraunces',serif; font-size:1.1rem; font-weight:700; color:var(--amber-lt); text-decoration:none; }

    /* Page */
    .page {
      position:relative; z-index:2;
      min-height:calc(100dvh - 60px);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      max-width:600px; margin:0 auto;
      padding:3rem 2rem; text-align:center;
    }

    /* Check */
    .check-ring {
      width:92px; height:92px; border-radius:50%;
      background:linear-gradient(135deg, var(--amber), var(--sage));
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 2rem;
      animation:popIn .65s cubic-bezier(.34,1.56,.64,1) both, ringPulse 3s 1.5s ease infinite;
    }
    @keyframes popIn { from{opacity:0;transform:scale(.15);} to{opacity:1;transform:scale(1);} }
    @keyframes ringPulse {
      0%   { box-shadow:0 0 0 0 rgba(200,131,26,.4); }
      70%  { box-shadow:0 0 0 22px rgba(200,131,26,0); }
      100% { box-shadow:0 0 0 0 rgba(200,131,26,0); }
    }

    .eyebrow { font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(--sage); margin-bottom:.7rem; animation:fadeUp .6s .2s ease both; }

    .conf-title {
      font-family:'Fraunces',serif;
      font-size:clamp(2.8rem,8vw,4.2rem); font-weight:900; line-height:1.05;
      animation:fadeUp .6s .3s ease both;
    }
    .conf-title em { font-style:italic; font-weight:400; color:var(--amber-lt); }

    .conf-msg {
      margin-top:1rem; font-size:.94rem; color:var(--muted); line-height:1.7;
      max-width:420px; animation:fadeUp .6s .42s ease both;
    }

    /* Status */
    .status-pill {
      display:inline-flex; align-items:center; gap:.5rem;
      background:rgba(122,158,126,.1); border:1px solid rgba(122,158,126,.22);
      border-radius:100px; padding:.38rem 1rem;
      font-size:.74rem; color:var(--sage);
      margin-top:1.6rem;
      animation:fadeUp .6s .52s ease both;
    }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--sage); animation:blink 2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

    /* Buttons */
    .btn-group {
      display:flex; align-items:center; gap:1rem; flex-wrap:wrap; justify-content:center;
      margin-top:2.2rem; animation:fadeUp .6s .62s ease both;
    }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:.55rem;
      padding:.92rem 1.7rem; border-radius:13px;
      font-family:'Outfit',sans-serif; font-size:.94rem; font-weight:600;
      text-decoration:none; border:none; cursor:pointer;
      transition:transform .2s, box-shadow .2s;
    }
    .btn-primary { background:var(--amber); color:#0e0b08; box-shadow:0 6px 24px rgba(200,131,26,.35); }
    .btn-primary:hover { transform:translateY(-2px); background:var(--amber-lt); }
    .btn-secondary { background:var(--card); color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { transform:translateY(-2px); border-color:rgba(200,131,26,.4); }

    .deco { font-size:1.8rem; letter-spacing:.4rem; margin-top:2.4rem; opacity:.35; animation:fadeUp .6s .75s ease both; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }

    @media (max-width:600px) {
      .page { padding:2rem 1.4rem; }
      .btn-group { flex-direction:column; width:100%; }
      .btn { width:100%; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <canvas id="confetti"></canvas>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo">🦈 Hammerhead Cafe</a>
    </div>
  </nav>

  <main class="page">
    <div class="check-ring">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M8 20L16 28L32 12" stroke="#0e0b08" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="eyebrow">✦ You're all set</p>
    <h1 class="conf-title">Order<br><em>Confirmed!</em></h1>
    <p class="conf-msg">
      Your pre-order has been sent via WhatsApp. We'll confirm your spot shortly — get ready for something good.
    </p>

    <span class="status-pill">
      <span class="live-dot"></span>
      Awaiting WhatsApp confirmation
    </span>

    <div class="btn-group">
      <a href="index.html" class="btn btn-primary">🏠 Back to Home</a>
      <a href="menu.html"  class="btn btn-secondary">📋 View Menu</a>
    </div>

    <div class="deco">🦈 &nbsp; 🧋 &nbsp; 🐠</div>
  </main>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const cols = ['#c8831a','#e8a84b','#7a9e7e','#f0e6d3','#ffffff','#3a7d58'];
    const pieces = Array.from({length:75}, () => ({
      x: Math.random()*canvas.width, y: -10-Math.random()*160,
      w:5+Math.random()*7, h:3+Math.random()*5,
      color:cols[Math.floor(Math.random()*cols.length)],
      vx:(Math.random()-.5)*2, vy:1.4+Math.random()*2.3,
      angle:Math.random()*360, va:(Math.random()-.5)*5, opacity:1,
    }));
    let f=0;
    (function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        ctx.save(); ctx.globalAlpha=p.opacity;
        ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.angle*Math.PI/180);
        ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
        p.x+=p.vx; p.y+=p.vy; p.angle+=p.va; p.vy+=.04;
        if(p.y>canvas.height) p.opacity=Math.max(0,p.opacity-.04);
      });
      if(++f<320) requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
